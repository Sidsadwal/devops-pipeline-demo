<!DOCTYPE html>
<html>
<head>
    <title>DevOps CI/CD Project</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1f4037, #99f2c8);
            color: white;
            text-align: center;
        }
        .container {
            padding: 50px;
        }
        h1 {
            font-size: 50px;
        }
        p {
            font-size: 20px;
        }
        .box {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 10px;
        }
        .btn {
            padding: 10px 20px;
            background: #ff9800;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
        .btn:hover {
            background: #e68900;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 DevOps CI/CD Pipeline</h1>
    <p>Automated Deployment using Jenkins, Docker & AWS</p>

    <div class="box">
        <h2>Project Features</h2>
        <p>✔ Continuous Integration</p>
        <p>✔ Continuous Deployment</p>
        <p>✔ Docker Containerization</p>
        <p>✔ GitHub Webhook Automation</p>
    </div>

    <div class="box">
        <h2>Live Status</h2>
        <p id="status">Deployment Successful ✅</p>
        <button class="btn" onclick="updateStatus()">Simulate Change</button>
    </div>
</div>

<script>
function updateStatus() {
    document.getElementById("status").innerHTML = "Updated Successfully 🔥";
}
</script>

</body>
</html>
