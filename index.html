<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard UI</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
    }

    /* Sidebar */
    .sidebar {
        width: 220px;
        height: 100vh;
        background: #020617;
        padding: 20px;
    }

    .sidebar h2 {
        color: #38bdf8;
    }

    .sidebar ul {
        list-style: none;
        padding: 0;
    }

    .sidebar ul li {
        padding: 10px;
        margin: 10px 0;
        cursor: pointer;
        border-radius: 8px;
    }

    .sidebar ul li:hover {
        background: #1e293b;
    }

    /* Main */
    .main {
        flex: 1;
        padding: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: #020617;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .card h3 {
        margin: 0;
        font-size: 14px;
        color: #94a3b8;
    }

    .card h1 {
        margin: 10px 0;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }

    /* Fake Graph */
    .graph {
        height: 50px;
        background: linear-gradient(90deg, #22c55e, #38bdf8);
        border-radius: 10px;
        opacity: 0.7;
    }

    /* Progress Bar */
    .progress {
        height: 8px;
        background: #1e293b;
        border-radius: 10px;
        overflow: hidden;
    }

    .progress span {
        display: block;
        height: 100%;
        background: #22c55e;
    }

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Dashboard</h2>
    <ul>
        <li>Home</li>
        <li>Analytics</li>
        <li>Apps</li>
        <li>Forms</li>
        <li>Tables</li>
    </ul>
</div>

<!-- Main Content -->
<div class="main">

    <h2>Widgets</h2>

    <div class="grid">

        <!-- Card 1 -->
        <div class="card">
            <h3>Total Sales</h3>
            <h1>$9,568</h1>
            <p class="red">↓ 8.6%</p>
            <div class="graph"></div>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <h3>Total Accounts</h3>
            <h1>85,247</h1>
            <p class="green">↑ 23.7%</p>
            <div class="graph"></div>
        </div>

        <!-- Card 3 -->
        <div class="card">
            <h3>Weekly Sales</h3>
            <h1>$69,452</h1>
            <p class="red">↓ 8.6%</p>
            <div class="graph"></div>
        </div>

        <!-- Card 4 -->
        <div class="card">
            <h3>Sales This Year</h3>
            <h1>$65,129</h1>
            <p class="green">↑ 24.7%</p>
            <div class="progress">
                <span style="width:68%"></span>
            </div>
        </div>

        <!-- Card 5 -->
        <div class="card">
            <h3>Sales This Month</h3>
            <h1>$88,367</h1>
            <p class="red">↑ 18.6%</p>
            <div class="progress">
                <span style="width:78%; background:#ef4444;"></span>
            </div>
        </div>

        <!-- Card 6 -->
        <div class="card">
            <h3>Sales This Week</h3>
            <h1>$55,674</h1>
            <p class="green">↑ 42.6%</p>
            <div class="progress">
                <span style="width:88%"></span>
            </div>
        </div>

    </div>

</div>

</body>
</html>
